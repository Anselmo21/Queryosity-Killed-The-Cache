services:
  postgres:
    image: postgres:16
    container_name: query_scheduler_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tpcds
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=8GB"
      - "-c"
      - "work_mem=512MB"
      - "-c"
      - "effective_cache_size=24GB"
    shm_size: "9gb"
    ports:
      - "5432:5432"
    volumes:
      - ${PGDATA_HOST_PATH:-./pgdata}:/var/lib/postgresql/data